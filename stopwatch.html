<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stopwatch</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: white;
      font-family: Arial;
    }

    .container {
      text-align: center;
    }

    #display {
      font-size: 50px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 5px;
    }

    .start { background: green; color: white; }
    .stop { background: red; color: white; }
    .reset { background: gray; color: white; }
  </style>
</head>
<body>

<div class="container">
  <h1>Stopwatch</h1>
  <div id="display">00:00:00</div>
  <button class="start" onclick="start()">Start</button>
  <button class="stop" onclick="stop()">Stop</button>
  <button class="reset" onclick="reset()">Reset</button>
</div>

<script>
  let seconds = 0;
  let minutes = 0;
  let hours = 0;
  let timer = null;

  function updateDisplay() {
    let h = hours < 10 ? "0" + hours : hours;
    let m = minutes < 10 ? "0" + minutes : minutes;
    let s = seconds < 10 ? "0" + seconds : seconds;

    document.getElementById("display").innerText = `${h}:${m}:${s}`;
  }

  function start() {
    if (timer !== null) return; // prevent multiple intervals

    timer = setInterval(() => {
      seconds++;

      if (seconds === 60) {
        seconds = 0;
        minutes++;
      }

      if (minutes === 60) {
        minutes = 0;
        hours++;
      }

      updateDisplay();
    }, 1000);
  }

  function stop() {
    clearInterval(timer);
    timer = null;
  }

  function reset() {
    stop();
    seconds = 0;
    minutes = 0;
    hours = 0;
    updateDisplay();
  }
</script>

</body>
</html>
